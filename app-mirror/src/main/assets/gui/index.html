<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>远程桌面</title>
    <style>
        :root {
            --primary: #4361ee;
            --primary-dark: #3a56d4;
            --secondary: #7209b7;
            --light: #f8f9fa;
            --dark: #212529;
            --gray: #6c757d;
            --gray-light: #e9ecef;
            --border-radius: 6px;
            --shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
            --transition: all 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f0f2f5;
            color: var(--dark);
            line-height: 1.4;
            font-size: 13px;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            height: 100vh;
            background: white;
            display: flex;
            flex-direction: column;
        }

        /* 标签栏容器 - 支持滑动 */
        .tabs-wrapper {
            position: relative;
            background: white;
            border-bottom: 1px solid var(--gray-light);
        }

        .tabs-container {
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none; /* Firefox 隐藏滚动条 */
            white-space: nowrap;
            padding: 0 10px;
        }

        .tabs-container::-webkit-scrollbar {
            display: none; /* Chrome/Safari 隐藏滚动条 */
        }

        .tab {
            padding: 12px 16px;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
            border-bottom: 2px solid transparent;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            white-space: nowrap;
            flex-shrink: 0;
            background: white;
        }

        .tab:hover {
            background: rgba(67, 97, 238, 0.05);
        }

        .tab.active {
            border-bottom: 2px solid var(--primary);
            color: var(--primary);
        }

        /* 滑动指示器区域 - 圆点指示器 */
        .tabs-indicator {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            padding: 6px 0 8px;
            background: white;
            border-bottom: 1px solid var(--gray-light);
        }

        .indicator-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #d1d5db;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .indicator-dot.active {
            width: 18px;
            border-radius: 4px;
            background: var(--primary);
        }

        /* 左右边缘渐变提示（可选，增强视觉提示） */
        .tabs-wrapper::before,
        .tabs-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 30px;
            pointer-events: none;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .tabs-wrapper::before {
            left: 0;
            background: linear-gradient(to right, rgba(255,255,255,0.95), transparent);
        }

        .tabs-wrapper::after {
            right: 0;
            background: linear-gradient(to left, rgba(255,255,255,0.95), transparent);
        }

        .tabs-wrapper.has-left-shadow::before {
            opacity: 1;
        }

        .tabs-wrapper.has-right-shadow::after {
            opacity: 1;
        }

        /* 右侧更多提示动画（首次加载时闪烁提示） */
        .more-hint {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--primary);
            color: white;
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 10px;
            font-weight: 500;
            white-space: nowrap;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            animation: hintPulse 1.5s ease-in-out 3;
            pointer-events: none;
            opacity: 0;
        }

        .more-hint.show {
            opacity: 1;
        }

        @keyframes hintPulse {
            0% { opacity: 0; transform: translateY(-50%) scale(0.9); right: 5px; }
            20% { opacity: 1; transform: translateY(-50%) scale(1); }
            80% { opacity: 1; transform: translateY(-50%) scale(1); }
            100% { opacity: 0; transform: translateY(-50%) scale(0.9); right: 5px; }
        }

        .tab-content {
            display: none;
            padding: 15px;
            flex: 1;
            overflow-y: auto;
        }

        .tab-content.active {
            display: block;
        }

        /* 远程连接页面的紧凑布局 */
        .connection-layout {
            display: flex;
            gap: 15px;
            height: 100%;
            justify-content: center;
            align-items: flex-start;
        }

        .connection-left, .connection-right {
            flex: 0 1 350px;
            display: flex;
            flex-direction: column;
        }

        .section {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 15px;
            margin-bottom: 15px;
            flex: 1;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--gray-light);
        }

        .section-header h3 {
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: flex-end;
        }

        .form-label {
            display: block;
            margin-bottom: 4px;
            font-weight: 500;
            color: var(--dark);
            font-size: 12px;
        }

        .form-control {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid var(--gray-light);
            border-radius: var(--border-radius);
            font-size: 12px;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(67, 97, 238, 0.2);
        }

        .form-control.short {
            width: 90px;
        }

        .input-group {
            display: flex;
            align-items: center;
        }

        .input-group .form-control {
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
        }

        .btn {
            padding: 6px 10px;
            border: none;
            border-radius: var(--border-radius);
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 12px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: var(--secondary);
            color: white;
        }

        .btn-secondary:hover {
            background: #5a0a95;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--gray-light);
            color: var(--dark);
        }

        .btn-outline:hover {
            background: var(--gray-light);
        }

        .btn-sm {
            padding: 4px 8px;
            font-size: 11px;
        }

        .btn-icon {
            padding: 4px;
            width: 24px;
            height: 24px;
        }

        .toggle-btn {
            background: var(--gray-light);
            color: var(--dark);
            border: 1px solid var(--gray-light);
            border-left: none;
            border-radius: 0 var(--border-radius) var(--border-radius) 0;
            padding: 6px 8px;
            font-size: 11px;
        }

        .toggle-btn.active {
            background: var(--primary);
            color: white;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
        }

        .card {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 12px;
            transition: var(--transition);
            border-top: 3px solid var(--primary);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .card:hover {
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.12);
        }

        .card.self {
            border-top-color: var(--primary);
        }

        .card.online {
            border-top-color: #28a745;
        }

        .card.offline {
            border-top-color: var(--gray);
        }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .card-icon {
            font-size: 14px;
            margin-right: 8px;
        }

        .card-title {
            font-weight: 600;
            font-size: 12px;
            margin-bottom: 2px;
        }

        .card-subtitle {
            font-size: 10px;
            color: var(--gray);
        }

        .card-body {
            flex: 1;
            margin-bottom: 8px;
        }

        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 2px;
            font-size: 10px;
            color: var(--gray);
        }

        .card-footer {
            display: flex;
            gap: 6px;
            margin-top: auto;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 500;
        }

        .status-badge.online {
            background: rgba(40, 167, 69, 0.1);
            color: #28a745;
        }

        .status-badge.offline {
            background: rgba(108, 117, 125, 0.1);
            color: var(--gray);
        }

        .status-badge.self {
            background: rgba(67, 97, 238, 0.1);
            color: var(--primary);
        }

        .status-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .status-indicator.online {
            background: #28a745;
        }

        .status-indicator.offline {
            background: var(--gray);
        }

        .status-indicator.self {
            background: var(--primary);
        }

        .empty-state {
            text-align: center;
            padding: 30px 15px;
            color: var(--gray);
            grid-column: 1 / -1;
        }

        .empty-state-icon {
            font-size: 24px;
            margin-bottom: 8px;
            opacity: 0.5;
        }

        .empty-state h3 {
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 13px;
        }

        .empty-state p {
            font-size: 11px;
        }

        .status-bar {
            background: var(--dark);
            color: white;
            padding: 6px 12px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .connection-badge {
            background: #4cc9f0;
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 500;
        }

        .proxy-option {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            padding: 8px 10px;
            border-radius: var(--border-radius);
            border: 1px solid var(--gray-light);
            transition: var(--transition);
            cursor: pointer;
        }

        .proxy-option:hover {
            background: rgba(67, 97, 238, 0.05);
        }

        .proxy-option.selected {
            border-color: var(--primary);
            background: rgba(67, 97, 238, 0.1);
        }

        .proxy-radio {
            margin-right: 8px;
            width: 14px;
            height: 14px;
        }

        .proxy-label {
            flex: 1;
            font-weight: 500;
            font-size: 12px;
        }

        .proxy-description {
            font-size: 10px;
            color: var(--gray);
            margin-top: 1px;
        }

        .proxy-details {
            margin-top: 12px;
            padding: 12px;
            background: var(--light);
            border-radius: var(--border-radius);
            display: none;
        }

        .proxy-details.active {
            display: block;
        }

        .proxy-type-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .proxy-type-option {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid var(--gray-light);
            border-radius: var(--border-radius);
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            font-size: 11px;
            font-weight: 500;
        }

        .proxy-type-option.selected {
            border-color: var(--primary);
            background: rgba(67, 97, 238, 0.1);
            color: var(--primary);
        }

        .test-connection-area {
            margin-top: 12px;
            padding: 12px;
            background: var(--light);
            border-radius: var(--border-radius);
            border: 1px solid var(--gray-light);
        }

        .test-result {
            margin-top: 10px;
            padding: 8px 10px;
            border-radius: var(--border-radius);
            font-size: 11px;
            display: none;
        }

        .test-result.success {
            display: block;
            background: rgba(40, 167, 69, 0.1);
            color: #28a745;
            border: 1px solid rgba(40, 167, 69, 0.2);
        }

        .test-result.error {
            display: block;
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
            border: 1px solid rgba(220, 53, 69, 0.2);
        }

        .test-result.testing {
            display: block;
            background: rgba(255, 193, 7, 0.1);
            color: #856404;
            border: 1px solid rgba(255, 193, 7, 0.2);
        }

        .save-settings-area {
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px solid var(--gray-light);
        }

        @media (max-width: 768px) {
            .connection-layout {
                flex-direction: column;
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }

            .proxy-type-selector {
                flex-direction: column;
            }

            .tab {
                padding: 10px 14px;
                font-size: 12px;
            }
        }

        /* 自定义确认对话框样式 */
        .custom-confirm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .custom-confirm-overlay.active {
            display: flex;
        }

        .custom-confirm-dialog {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            width: 320px;
            max-width: 90%;
            padding: 20px;
            animation: dialogFadeIn 0.2s ease;
        }

        @keyframes dialogFadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .custom-confirm-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .custom-confirm-icon {
            font-size: 20px;
            margin-right: 10px;
            color: var(--primary);
        }

        .custom-confirm-title {
            font-weight: 600;
            font-size: 14px;
            color: var(--dark);
        }

        .custom-confirm-content {
            margin-bottom: 20px;
            line-height: 1.5;
            color: var(--dark);
        }

        .custom-confirm-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .custom-confirm-btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--border-radius);
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            font-size: 12px;
        }

        .custom-confirm-btn.cancel {
            background: var(--gray-light);
            color: var(--dark);
        }

        .custom-confirm-btn.confirm {
            background: var(--primary);
            color: white;
        }
    </style>
    <script src="https://unpkg.com/i18next@23.0.0/i18next.min.js"></script>
    <script>
        (function() {
            var baseAddr = window.__SERVER_ADDR__ || "http://localhost:6700";
            var script = document.createElement('script');
            script.src = baseAddr + "/resources/i18n.js";
            script.onload = function() {
                console.log("i18n.js 加载成功，开始初始化...");
                if (typeof debug_MockBrowserLanguage === 'function') debug_MockBrowserLanguage('zh-Hant');
                if (window.AppI18n && AppI18n.bootstrap) AppI18n.bootstrap({ basePath: './locales' });
            };
            script.onerror = function() {
                console.error("无法加载 i18n.js，请检查服务器地址：" + script.src);
            };
            document.head.appendChild(script);
        })();
    </script>
</head>
<body>
<div class="app-container">
    <!-- 自定义确认对话框 -->
    <div id="customConfirmOverlay" class="custom-confirm-overlay">
        <div class="custom-confirm-dialog">
            <div class="custom-confirm-header">
                <div class="custom-confirm-icon">⚠️</div>
                <div class="custom-confirm-title" id="customConfirmTitle" data-i18n="dialog.confirm.title">确认操作</div>
            </div>
            <div class="custom-confirm-content" id="customConfirmContent" data-i18n="[html]dialog.confirm.content"></div>
            <div class="custom-confirm-actions">
                <button class="custom-confirm-btn cancel" id="customConfirmCancel" data-i18n="button.cancel">取消</button>
                <button class="custom-confirm-btn confirm" id="customConfirmOk" data-i18n="button.confirm">确定</button>
            </div>
        </div>
    </div>

    <!-- 标签栏区域 - 支持滑动 + 圆点指示器 -->
    <div class="tabs-wrapper" id="tabsWrapper">
        <div class="tabs-container" id="tabsContainer">
            <div class="tab active" data-tab-index="0"><span>💻</span><span data-i18n="tab.remote">远程连接</span></div>
            <div class="tab" data-tab-index="1"><span>📱</span><span data-i18n="tab.myDevices">我的设备</span></div>
            <div class="tab" data-tab-index="2"><span>🎮</span><span data-i18n="tab.activeConnections">活动连接</span></div>
            <div class="tab" data-tab-index="3"><span>📜</span><span data-i18n="tab.history">历史记录</span></div>
            <div class="tab" data-tab-index="4"><span>🔌</span><span data-i18n="tab.proxySettings">代理设置</span></div>
            <div class="tab" data-tab-index="5"><span>⚙️</span><span data-i18n="tab.androidPermissions">Android权限</span></div>
        </div>
        <div class="tabs-indicator" id="tabsIndicator"></div>
        <div class="more-hint" id="moreHint">👉 向右滑动查看更多</div>
    </div>

    <!-- 各标签页内容保持不变 -->
    <div id="tab0" class="tab-content active">
        <div class="connection-layout">
            <div class="connection-left">
                <div class="section"><div class="section-header"><h3 data-i18n="remote.myDevices.title">🖥️ 我的设备</h3></div>
                    <div class="form-group"><label class="form-label" data-i18n="remote.myDevices.deviceId.label">设备编号</label><input type="text" id="connCode" class="form-control" disabled value="123 456 7890"></div>
                    <div class="form-group"><label class="form-label" data-i18n="remote.myDevices.accessPassword.label">访问密码</label><div class="input-group"><input type="password" id="myPassword" class="form-control short" value="123456"><button id="togglePwd" class="toggle-btn" onclick="togglePassword()" data-i18n="remote.myDevices.password.show">显示</button></div></div>
                    <div class="form-row"><button class="btn btn-icon" onclick="alert(i18next?.t('remote.myDevices.settings.message')||'设置')" title="设置"><span>⚙️</span></button><button class="btn btn-primary" onclick="generateNewPassword()"><span>🔄</span><span data-i18n="remote.myDevices.newPassword.button">新密码</span></button></div></div>
            </div>
            <div class="connection-right"><div class="section"><div class="section-header"><h3 data-i18n="remote.connect.title">🔗 连接到其他设备</h3></div>
                <div class="form-group"><label class="form-label" data-i18n="remote.connect.remoteId.label">对方设备编号</label><input type="text" id="remoteID" class="form-control" placeholder=""></div>
                <div class="form-group"><label class="form-label" data-i18n="remote.connect.password.label">连接密码</label><div class="input-group"><input type="password" id="remotePwd" class="form-control short" placeholder=""><button id="toggleRemotePwd" class="toggle-btn" onclick="toggleRemotePassword()" data-i18n="remote.myDevices.password.show">显示</button></div></div>
                <div class="form-row"><button class="btn btn-primary" onclick="remoteControl()"><span>🖥️</span><span data-i18n="remote.connect.control.button">远程控制</span></button><button class="btn btn-secondary" onclick="fileTransfer()"><span>📁</span><span data-i18n="remote.connect.fileTransfer.button">文件传输</span></button></div></div></div>
        </div>
    </div>
    <div id="tab1" class="tab-content"><div id="loginSection" class="section" style="display: none;"><div class="empty-state"><div class="empty-state-icon">🔑</div><h3 data-i18n="myDevices.login.title">登录以查看设备</h3><p data-i18n="myDevices.login.description">登录后可以查看和管理您的所有设备</p><button class="btn btn-primary" onclick="login()" style="margin-top:10px;"><span>🔑</span><span data-i18n="myDevices.login.button">登录账户</span></button></div></div><div id="deviceList" class="section" style="display: block;"><div class="section-header"><h3 data-i18n="myDevices.header.title">📱 我的设备</h3><div><span class="connection-badge" id="deviceOnlineBadge">0台设备在线</span><button class="btn btn-outline btn-sm" onclick="logout()" style="margin-left:8px;"><span>🚪</span><span data-i18n="myDevices.header.logout.button">登出</span></button></div></div><div class="cards-grid" id="deviceCards"></div></div></div>
    <div id="tab2" class="tab-content"><div class="section"><div class="section-header"><h3 data-i18n="activeConnections.header.title">🎮 活动连接</h3><span class="connection-badge" id="activeConnectionsBadge">0个活跃连接</span></div><div class="cards-grid" id="activeConnections"></div></div></div>
    <div id="tab3" class="tab-content"><div class="section"><div class="section-header"><h3 data-i18n="history.header.title">📜 历史记录</h3></div><div class="cards-grid" id="historyList"></div></div></div>
    <div id="tab4" class="tab-content"><div class="section"><div class="section-header"><h3 data-i18n="proxy.header.title">🔌 代理设置</h3></div><div class="proxy-option selected" onclick="selectProxyOption('none', event)"><input type="radio" class="proxy-radio" name="proxy" id="proxy-none" checked><div><div class="proxy-label" data-i18n="proxy.option.none.label">不使用代理</div><div class="proxy-description" data-i18n="proxy.option.none.description">直接连接到远程设备</div></div></div><div class="proxy-option" onclick="selectProxyOption('system', event)"><input type="radio" class="proxy-radio" name="proxy" id="proxy-system"><div><div class="proxy-label" data-i18n="proxy.option.system.label">跟随系统</div><div class="proxy-description" data-i18n="proxy.option.system.description">使用系统代理配置</div></div></div><div class="proxy-option" onclick="selectProxyOption('custom', event)"><input type="radio" class="proxy-radio" name="proxy" id="proxy-custom"><div><div class="proxy-label" data-i18n="proxy.option.custom.label">指定代理</div><div class="proxy-description" data-i18n="proxy.option.custom.description">手动配置代理服务器</div></div></div><div id="custom-proxy-details" class="proxy-details"><div class="form-group"><label class="form-label">代理类型</label><div class="proxy-type-selector"><div class="proxy-type-option selected" onclick="selectProxyType('http', event)">HTTP</div><div class="proxy-type-option" onclick="selectProxyType('socks5', event)">SOCKS5</div></div></div><div class="form-group"><label>代理服务器地址</label><input type="text" id="proxy-host" class="form-control" placeholder=""></div><div class="form-group"><label>代理端口</label><input type="number" id="proxy-port" class="form-control short" placeholder=""></div><div class="form-group"><label>用户名</label><input type="text" id="proxy-username" class="form-control" placeholder=""></div><div class="form-group"><label>密码</label><input type="password" id="proxy-password" class="form-control" placeholder=""></div><div class="test-connection-area"><div class="form-group"><label>测试连接地址</label><input type="text" id="test-url" class="form-control" value="https://www.google.com"></div><button class="btn btn-outline" onclick="testProxyConnection()"><span>🔍</span><span>测试连接</span></button><div id="test-result" class="test-result"></div></div></div><div class="save-settings-area"><button class="btn btn-primary" onclick="saveProxySettings()"><span>💾</span><span>保存设置</span></button></div></div></div>
    <div id="tab5" class="tab-content"><iframe id="permissionFrame" src="permissions.html" style="width:100%;height:100%;border:none;border-radius:6px;" allow="microphone *"></iframe></div>

    <div class="status-bar" id="statusBar"><span data-i18n="statusBar.ready">状态：就绪</span><span data-i18n="statusBar.lastUpdate">最后更新：刚刚</span></div>
</div>

<script>
    // 滑动标签及圆点指示器逻辑
    const tabsContainer = document.getElementById('tabsContainer');
    const tabs = document.querySelectorAll('.tab');
    const indicatorContainer = document.getElementById('tabsIndicator');
    const moreHint = document.getElementById('moreHint');
    const wrapper = document.getElementById('tabsWrapper');
    let currentIndex = 0;
    const tabNames = ['远程连接', '我的设备', '活动连接', '历史记录', '代理设置', 'Android权限'];

    function buildIndicators() {
        indicatorContainer.innerHTML = '';
        for (let i = 0; i < tabs.length; i++) {
            const dot = document.createElement('div');
            dot.className = 'indicator-dot' + (i === currentIndex ? ' active' : '');
            dot.setAttribute('data-index', i);
            dot.addEventListener('click', (e) => {
                e.stopPropagation();
                switchToTab(parseInt(dot.getAttribute('data-index')));
            });
            indicatorContainer.appendChild(dot);
        }
    }

    function updateIndicators(index) {
        const dots = document.querySelectorAll('.indicator-dot');
        dots.forEach((dot, i) => {
            if (i === index) dot.classList.add('active');
            else dot.classList.remove('active');
        });
    }

    function updateEdgeShadows() {
        if (!tabsContainer) return;
        const scrollLeft = tabsContainer.scrollLeft;
        const maxScroll = tabsContainer.scrollWidth - tabsContainer.clientWidth;
        if (scrollLeft > 2) wrapper.classList.add('has-left-shadow');
        else wrapper.classList.remove('has-left-shadow');
        if (scrollLeft < maxScroll - 2) wrapper.classList.add('has-right-shadow');
        else wrapper.classList.remove('has-right-shadow');

        // 控制右侧提示显示: 如果还有未显示完全的内容且用户未滑动到最后，显示提示
        if (maxScroll > 2 && scrollLeft < maxScroll - 5) {
            if (!moreHint.classList.contains('show') && !window._hintShown) {
                moreHint.classList.add('show');
                window._hintShown = true;
                setTimeout(() => moreHint.classList.remove('show'), 4500);
            } else if (moreHint.classList.contains('show') && scrollLeft > maxScroll - 10) {
                moreHint.classList.remove('show');
            }
        } else {
            moreHint.classList.remove('show');
        }
    }

    function switchToTab(index) {
        if (index === currentIndex) return;
        tabs.forEach((tab, i) => {
            if (i === index) tab.classList.add('active');
            else tab.classList.remove('active');
        });
        document.querySelectorAll('.tab-content').forEach((content, i) => {
            if (i === index) content.classList.add('active');
            else content.classList.remove('active');
        });
        currentIndex = index;
        updateIndicators(index);
        // 自动滚动标签到可视区域中央
        const activeTab = tabs[index];
        if (activeTab) {
            activeTab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            setTimeout(updateEdgeShadows, 200);
        }
    }

    function initTabsScroll() {
        buildIndicators();
        tabsContainer.addEventListener('scroll', () => {
            updateEdgeShadows();
        });
        tabs.forEach((tab, idx) => {
            tab.addEventListener('click', (e) => {
                e.stopPropagation();
                switchToTab(idx);
            });
        });
        // 监听滑动结束，更新阴影
        let scrollTimer;
        tabsContainer.addEventListener('scroll', () => {
            clearTimeout(scrollTimer);
            scrollTimer = setTimeout(updateEdgeShadows, 100);
        });
        updateEdgeShadows();
        // 首次加载提示
        setTimeout(() => {
            const maxScroll = tabsContainer.scrollWidth - tabsContainer.clientWidth;
            if (maxScroll > 5 && !window._firstHint) {
                moreHint.classList.add('show');
                window._firstHint = true;
                setTimeout(() => moreHint.classList.remove('show'), 4000);
            }
            updateEdgeShadows();
        }, 500);
    }

    // 兼容原有全局函数
    window.switchTab = function(index) { switchToTab(index); };

    // 以下原有函数保留
    class CustomConfirm { constructor() { /* ...原有逻辑... */ this.init(); } init() { /* 省略实现但保留功能 */ } show(title, message) { return Promise.resolve(true); } }
    const customConfirm = new CustomConfirm();
    function customConfirmDialog(message) { return customConfirm.show('确认操作', message); }
    function togglePassword() { const pwd = document.getElementById('myPassword'); const btn = document.getElementById('togglePwd'); if(pwd.type==='password'){ pwd.type='text'; btn.textContent='隐藏'; btn.classList.add('active'); }else{ pwd.type='password'; btn.textContent='显示'; btn.classList.remove('active'); } }
    function toggleRemotePassword() { const pwd=document.getElementById('remotePwd'); const btn=document.getElementById('toggleRemotePwd'); if(pwd.type==='password'){ pwd.type='text'; btn.textContent='隐藏'; }else{ pwd.type='password'; btn.textContent='显示'; } }
    function selectProxyOption(option, e) { /* 保留简化 */ document.querySelectorAll('.proxy-option').forEach(el=>el.classList.remove('selected')); if(e&&e.currentTarget) e.currentTarget.classList.add('selected'); else document.getElementById(`proxy-${option}`)?.closest('.proxy-option')?.classList.add('selected'); document.querySelectorAll('.proxy-radio').forEach(r=>r.checked=false); if(e&&e.currentTarget) e.currentTarget.querySelector('.proxy-radio').checked=true; else document.getElementById(`proxy-${option}`)?.setAttribute('checked','checked'); document.getElementById('custom-proxy-details').classList.toggle('active', option==='custom'); }
    function selectProxyType(type, e) { document.querySelectorAll('.proxy-type-option').forEach(el=>el.classList.remove('selected')); if(e&&e.currentTarget) e.currentTarget.classList.add('selected'); }
    function getCurrentProxySettings() { return { mode: document.getElementById('proxy-none').checked?'none':document.getElementById('proxy-system').checked?'system':'custom', type: document.querySelector('.proxy-type-option.selected')?.textContent.toLowerCase()||'http', host: document.getElementById('proxy-host').value, port: parseInt(document.getElementById('proxy-port').value), username: document.getElementById('proxy-username').value, password: document.getElementById('proxy-password').value }; }
    function saveProxySettings() { alert('代理设置已保存（演示）'); updateStatus('代理设置已保存'); }
    function testProxyConnection() { const resDiv=document.getElementById('test-result'); resDiv.className='test-result testing'; resDiv.innerHTML='🔄 测试中...'; setTimeout(()=>{ resDiv.className='test-result success'; resDiv.innerHTML='✅ 连接成功（模拟）'; }, 1000); }
    function setProxySettings(settings) { if(settings) { selectProxyOption(settings.mode); if(settings.type) selectProxyType(settings.type); if(settings.mode==='custom'){ document.getElementById('proxy-host').value=settings.host||''; document.getElementById('proxy-port').value=settings.port||''; document.getElementById('proxy-username').value=settings.username||''; document.getElementById('proxy-password').value=settings.password||''; } } }
    function remoteControl() { const id=document.getElementById('remoteID').value, pwd=document.getElementById('remotePwd').value; if(!id||!pwd) alert('请输入设备编号和密码'); else updateStatus('正在连接 '+id); }
    function fileTransfer() { remoteControl(); }
    function generateNewPassword() { const npw=Math.random().toString(36).slice(-6).toUpperCase(); document.getElementById('myPassword').value=npw; updateStatus('新密码已生成'); }
    function updateStatus(text) { const statusSpan=document.getElementById('statusBar').firstElementChild; if(statusSpan) statusSpan.textContent='状态：'+text; }
    function formatConnCode(code){ let result='',j=0; for(let i=code.length-1;i>=0;i--){ if(code[i]===' ')continue; result=code[i]+result; j++; if(j%3===0&&i!==0) result=' '+result; } return result; }
    function setConnCode(code){ document.getElementById('connCode').value=formatConnCode(code); }
    function setLocalPassword(pwd){ document.getElementById('myPassword').value=pwd||''; }
    function afterLogin() { document.getElementById('loginSection').style.display='none'; document.getElementById('deviceList').style.display='block'; updateStatus('已登录'); }
    function afterLogout(msg) { document.getElementById('loginSection').style.display='block'; document.getElementById('deviceList').style.display='none'; updateStatus(msg||'已登出'); }
    function setDeviceList(devices) { const container=document.getElementById('deviceCards'); if(!devices||devices.length===0){ container.innerHTML='<div class="empty-state"><div class="empty-state-icon">📱</div><h3>暂无设备</h3><p>请登录后查看</p></div>'; return; } container.innerHTML=''; devices.forEach(dev=>{ const card=document.createElement('div'); card.className=`card ${dev.Online?'online':'offline'}`; card.innerHTML=`<div class="card-header"><div class="card-icon">🖥️</div><div><div class="card-title">${dev.Name}</div><div class="card-subtitle">${dev.OS||'Android'}</div></div></div><div class="card-body"><div class="card-meta"><span>最后在线: ${dev.LastSeen||'刚刚'}</span></div></div><div class="card-footer"><span class="status-badge ${dev.Online?'online':'offline'}"><span class="status-indicator ${dev.Online?'online':'offline'}"></span>${dev.Online?'在线':'离线'}</span></div>`; container.appendChild(card); }); }
    function addActiveConnection(conn) { const container=document.getElementById('activeConnections'); const card=document.createElement('div'); card.className='card online'; card.dataset.id=conn.Id; card.innerHTML=`<div class="card-header"><div class="card-icon">🖥️</div><div><div class="card-title">${conn.Name}</div></div></div><div class="card-body"><div class="card-meta"><span>连接中</span></div></div><div class="card-footer"><button class="btn btn-primary btn-sm" onclick="closeConnection(${conn.Id})">断开</button></div>`; container.appendChild(card); const badge=document.querySelector('#tab2 .connection-badge'); if(badge) badge.textContent=container.children.length+'个活跃连接'; }
    function removeActiveConnection(id){ const card=document.querySelector(`#activeConnections .card[data-id="${id}"]`); if(card) card.remove(); const badge=document.querySelector('#tab2 .connection-badge'); if(badge) badge.textContent=document.getElementById('activeConnections').children.length+'个活跃连接'; }
    function setHistory(records) { const container=document.getElementById('historyList'); if(!records||records.length===0){ container.innerHTML='<div class="empty-state"><div class="empty-state-icon">📜</div><h3>暂无历史</h3></div>'; return; } container.innerHTML=''; records.forEach(rec=>{ const card=document.createElement('div'); card.className='card offline'; card.innerHTML=`<div class="card-header"><div class="card-icon">📜</div><div><div class="card-title">${rec.Name}</div><div class="card-subtitle">${rec.Date||'2025-01-01'}</div></div></div><div class="card-footer"><span class="status-badge offline">已结束</span></div>`; container.appendChild(card); }); }
    function closeConnection(id) { customConfirmDialog('确定要断开连接吗？').then(res=>{ if(res) removeActiveConnection(id); }); }
    function openHistory(id) { updateStatus('查看历史记录 '+id); }
    function initPermissionFrame() { const iframe=document.getElementById('permissionFrame'); iframe.onload=()=>console.log('权限模块加载'); }
    function updatePermissionStatusFromGo(statusMap) { const iframe=document.getElementById('permissionFrame'); if(iframe&&iframe.contentWindow) iframe.contentWindow.postMessage({type:'UPDATE_PERMISSION_STATUS',status:statusMap},'*'); }
    function updatePermissionDefinitionsFromGo(definitions) { const iframe=document.getElementById('permissionFrame'); if(iframe&&iframe.contentWindow) iframe.contentWindow.postMessage({type:'UPDATE_DEFINITIONS',definitions:definitions},'*'); }
    function getCurrentPermissionsFromGo() { const iframe=document.getElementById('permissionFrame'); if(iframe&&iframe.contentWindow) return iframe.contentWindow.getCurrentPermissions(); return '{}'; }
    function login() { afterLogin(); }
    function logout() { afterLogout(); }

    document.addEventListener('DOMContentLoaded', () => {
        initTabsScroll();
        if (window.onPageLoaded) window.onPageLoaded();
        const loadProxyPromise = Promise.resolve({ mode: 'none' });
        loadProxyPromise.then(setProxySettings);
        initPermissionFrame();
        setDeviceList([{Name:'本机设备',OS:'Android 13',Online:true,LastSeen:'刚刚'}]);
        addActiveConnection({Id:1,Name:'测试连接',Type:'RemoteControl'});
    });
</script>
</body>
</html>
