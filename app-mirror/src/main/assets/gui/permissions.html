<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>权限管理</title>
    <style>
        /* 样式代码保持不变 */
        :root {
            --primary: #4361ee;
            --border-radius: 6px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            font-size: 13px;
            height: 100vh;
            overflow: hidden;
        }
        .permission-container {
            height: 100%;
            padding: 15px;
            overflow-y: auto;
        }
        .permission-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .permission-header h3 {
            margin: 0;
            font-size: 16px;
            color: #38bdf8;
        }
        .permission-header p {
            margin: 8px 0 0;
            color: #94a3b8;
            font-size: 11px;
        }
        .permission-group {
            background: #1e293b;
            border-radius: var(--border-radius);
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid #334155;
        }
        .group-header {
            background: #0f172a;
            padding: 12px 16px;
            border-bottom: 2px solid #38bdf8;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .group-name {
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .group-desc {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 4px;
        }
        .group-toggle-icon {
            transition: transform 0.2s;
        }
        .group-toggle-icon.collapsed {
            transform: rotate(-90deg);
        }
        .permission-items {
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 10px;
        }
        .permission-items.collapsed {
            display: none;
        }
        .permission-card {
            background: #0f172a;
            border-radius: var(--border-radius);
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #334155;
            border-left: 4px solid #ef4444;
        }
        .permission-card.granted {
            border-left-color: #22c55e;
            background: rgba(34, 197, 94, 0.08);
        }
        .permission-info {
            flex: 1;
            margin-right: 12px;
        }
        .permission-title {
            font-weight: 600;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }
        .permission-desc {
            font-size: 10px;
            color: #94a3b8;
        }
        .required-badge {
            color: #ef4444;
            font-size: 10px;
        }
        .permission-btn {
            padding: 6px 12px;
            border-radius: var(--border-radius);
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-size: 11px;
            min-width: 70px;
        }
        .permission-btn.go {
            background: #38bdf8;
            color: #0f172a;
        }
        .permission-btn.ok {
            background: #334155;
            color: #94a3b8;
            cursor: default;
        }
        .status-bar {
            background: #0f172a;
            border-top: 1px solid #334155;
            padding: 6px 12px;
            font-size: 11px;
            color: #94a3b8;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
        }
    </style>
    <script src="https://unpkg.com/i18next@23.0.0/i18next.min.js"></script>
</head>
<body>
<div class="permission-container">
    <div class="permission-header">
        <h3 id="headerTitle"></h3>
        <p id="headerDesc"></p>
    </div>
    <div id="permissionGroupsContainer"></div>
</div>
<div class="status-bar">
    <span id="statusText"></span>
    <span id="lastUpdate"></span>
</div>

<script>
    // 全局变量
    let permissionGroups = null;
    let currentLanguage = 'zh';

    // 初始化 i18next
    async function initI18n() {
        // 更新页面文本
        updateUIText();
    }

    // 更新 UI 文本
    function updateUIText() {
        if (!permissionGroups) return;

        document.getElementById('headerTitle').innerHTML = `⚙️ ${i18next.t('core_screen_name')}`;
        document.getElementById('headerDesc').innerHTML = i18next.t('core_screen_desc');
        document.getElementById('statusText').innerHTML = i18next.t('status_ready');
        document.getElementById('lastUpdate').innerHTML = `${i18next.t('status_last_update')}: ${new Date().toLocaleTimeString()}`;

        // 重新渲染权限列表以更新文字
        renderPermissions();
    }

    // Java 调用：更新整个权限UI（一次性传入完整数据）
    window.updatePermissionUI = function(data) {
        console.log("收到权限数据:", data);
        permissionGroups = data.groups;
        renderPermissions();
        updateUIText();
    };

    // Java 调用：更新单个权限
    window.updateSinglePermission = function(permId, granted) {
        if (permissionGroups) {
            for (let group of permissionGroups) {
                for (let perm of group.permissions) {
                    if (perm.id === permId) {
                        perm.granted = granted;
                        renderPermissions();
                        return;
                    }
                }
            }
        }
    };

    // 渲染权限列表
    function renderPermissions() {
        const container = document.getElementById('permissionGroupsContainer');
        if (!container || !permissionGroups) return;
        container.innerHTML = '';

        for (let group of permissionGroups) {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'permission-group';

            const groupName = i18next.t(group.groupNameKey);
            const groupDesc = i18next.t(group.groupDescKey);

            const header = document.createElement('div');
            header.className = 'group-header';
            let collapsedState = true;

            header.innerHTML = `
                <div>
                    <div class="group-name">
                        <span>${group.icon || '📦'}</span>
                        <span>${groupName}</span>
                    </div>
                    ${groupDesc && groupDesc !== group.groupDescKey ? `<div class="group-desc">${groupDesc}</div>` : ''}
                </div>
                <div class="group-toggle-icon ${collapsedState ? 'collapsed' : ''}">▼</div>
            `;

            const itemsDiv = document.createElement('div');
            itemsDiv.className = `permission-items ${collapsedState ? 'collapsed' : ''}`;

            for (let perm of group.permissions) {
                const isGranted = perm.granted === true;
                const permName = i18next.t(perm.nameKey);
                const permDesc = i18next.t(perm.descKey);

                const card = document.createElement('div');
                card.className = `permission-card ${isGranted ? 'granted' : 'denied'}`;
                card.innerHTML = `
                    <div class="permission-info">
                        <div class="permission-title">
                            <span>${perm.icon || '🔘'}</span>
                            <span>${permName}</span>
                            ${perm.required ? `<span class="required-badge">(${i18next.t('badge_required')})</span>` : ''}
                        </div>
                        <div class="permission-desc">${permDesc}</div>
                    </div>
                    <button class="permission-btn ${isGranted ? 'ok' : 'go'}" data-perm-id="${perm.id}">
                        ${isGranted ? `✅ ${i18next.t('button_granted')}` : `🔓 ${i18next.t('button_go_auth')}`}
                    </button>
                `;

                const btn = card.querySelector('.permission-btn');
                if (!isGranted) {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        // 通知 Java 层请求权限
                        if (window._android_bridge) {
                            window._android_bridge.requestPermission(perm.id);
                        }
                    });
                }
                itemsDiv.appendChild(card);
            }

            header.addEventListener('click', () => {
                const isCollapsed = itemsDiv.classList.contains('collapsed');
                if (isCollapsed) {
                    itemsDiv.classList.remove('collapsed');
                    header.querySelector('.group-toggle-icon').classList.remove('collapsed');
                } else {
                    itemsDiv.classList.add('collapsed');
                    header.querySelector('.group-toggle-icon').classList.add('collapsed');
                }
            });

            groupDiv.appendChild(header);
            groupDiv.appendChild(itemsDiv);
            container.appendChild(groupDiv);
        }
    }

    // 启动
    initI18n();
</script>
<script>
    function applyI18n() {
    // 1. Check if parent is already ready (The "Pull")
    const parentI18n = window.parent.i18next;
    if (parentI18n && parentI18n.isInitialized) {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            el.innerText = parentI18n.t(el.getAttribute('data-i18n'));
        });
    }
}

// 2. Listen for updates from Parent (The "Push")
window.addEventListener('message', (event) => {
    if (event.data.type === 'SET_LANGUAGE') {
        applyI18n();
    }
});

// 3. Initial check when iframe finishes loading
window.onload = applyI18n;
</script>
</body>
</html>
