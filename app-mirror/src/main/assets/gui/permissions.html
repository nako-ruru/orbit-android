<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title data-i18n="core_screen_name">权限管理</title>
    <style>
        :root { --primary:#4361ee; --border-radius:6px;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#f8fafc;font-size:13px;height:100vh;overflow:hidden;}
        .permission-container{height:100%;padding:15px;overflow-y:auto;}
        .permission-header{text-align:center;margin-bottom:20px;}
        .permission-header h3,.permission-header p{margin:0;}
        .permission-header p{margin-top:8px;font-size:11px;color:#94a3b8;}
        .permission-group{background:#1e293b;border-radius:var(--border-radius);margin-bottom:20px;overflow:hidden;border:1px solid #334155;}
        .group-header{background:#0f172a;padding:12px 16px;border-bottom:2px solid #38bdf8;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
        .group-name{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;}
        .group-desc{font-size:11px;color:#94a3b8;margin-top:4px;}
        .group-toggle-icon{transition:transform 0.2s;}
        .group-toggle-icon.collapsed{transform:rotate(-90deg);}
        .permission-items{padding:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px;}
        .permission-items.collapsed{display:none;}
        .permission-card{background:#0f172a;border-radius:var(--border-radius);padding:12px;display:flex;align-items:center;justify-content:space-between;border:1px solid #334155;border-left:4px solid #ef4444;}
        .permission-card.granted{border-left-color:#22c55e;background:rgba(34,197,94,0.08);}
        .permission-info{flex:1;margin-right:12px;}
        .permission-title{font-weight:600;font-size:12px;display:flex;align-items:center;gap:6px;margin-bottom:4px;}
        .permission-desc{font-size:10px;color:#94a3b8;}
        .required-badge{color:#ef4444;font-size:10px;}
        .permission-btn{padding:6px 12px;border-radius:var(--border-radius);border:none;cursor:pointer;font-weight:500;font-size:11px;min-width:70px;}
        .permission-btn.go{background:#38bdf8;color:#0f172a;}
        .permission-btn.ok{background:#334155;color:#94a3b8;cursor:default;}
    </style>
</head>
<body>
<div class="permission-container">
    <div class="permission-header">
        <h3 data-i18n="android.permissions.header">⚙️ 无人值守授权配置</h3>
        <p data-i18n="android.permissions.description">请确保以下所有权限均显示为"已开启"，否则受控端无法正常工作</p>
    </div>
    <div id="permissionGroupsContainer"></div>
</div>

<script>
    function renderPermissions(groups){
        const container=document.getElementById('permissionGroupsContainer');
        container.innerHTML='';

        groups.forEach(group=>{
            const collapsed = false;

            const groupHTML=`
    <div class="permission-group">
      <div class="group-header">
        <div>
          <div class="group-name">
            <span>${group.icon||'📦'}</span>
            <span data-i18n="${group.groupNameKey}">${group.groupNameKey}</span>
          </div>
          ${group.groupDescKey?`<div class="group-desc" data-i18n="${group.groupDescKey}">${group.groupDescKey}</div>`:''}
        </div>
        <div class="group-toggle-icon ${collapsed?'collapsed':''}">▼</div>
      </div>
      <div class="permission-items ${collapsed?'collapsed':''}">
        ${group.permissions.map(perm=>{
                const granted = perm.granted===true;
                return `
          <div class="permission-card ${granted?'granted':'denied'}">
            <div class="permission-info">
              <div class="permission-title">
                <span>${perm.icon||'🔘'}</span>
                <span data-i18n="${perm.nameKey}">${perm.nameKey}</span>
              </div>
              <div class="permission-desc" data-i18n="${perm.descKey}">${perm.descKey}</div>
            </div>
            <button class="permission-btn ${granted?'ok':'go'}" data-perm-id="${perm.id}">
              ${granted?`✅ <span data-i18n="android.permissions.action.ok">已授权</span>`:`🔓 <span data-i18n="android.permissions.action.go">去授权</span>`}
            </button>
          </div>`;
            }).join('')}
      </div>
    </div>
    `;

            container.insertAdjacentHTML('beforeend',groupHTML);
        });

        // 添加事件
        container.querySelectorAll('.group-header').forEach(header=>{
            header.addEventListener('click',()=>{
                const itemsDiv=header.nextElementSibling;
                const groupId=header.closest('.permission-group').dataset.groupId;
                const collapsedState=itemsDiv.classList.toggle('collapsed');
                header.querySelector('.group-toggle-icon').classList.toggle('collapsed');
            });
        });

        container.querySelectorAll('.permission-btn.go').forEach(btn=>{
            btn.addEventListener('click',e=>{
                e.stopPropagation();
                const permId=btn.dataset.permId;
                if(window._android_bridge) window._android_bridge.requestPermission(permId);
            });
        });

        applyI18n();
    }

    window.updatePermissionUI=function(data){
        renderPermissions(data.groups);
    };

    window.updateSinglePermission=function(groups,permId,granted){
        groups.forEach(g=>g.permissions.forEach(p=>{if(p.id===permId)p.granted=granted;}));
        renderPermissions(groups);
    };
</script>

<script>
    function applyI18n() {
        // 1. Check if parent is already ready (The "Pull")
        const parentI18n = window.parent.i18next;
        if (parentI18n && parentI18n.isInitialized) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                el.innerText = parentI18n.t(el.getAttribute('data-i18n'));
            });
        }
    }

    // 2. Listen for updates from Parent (The "Push")
    window.addEventListener('message', (event) => {
        if (event.data.type === 'SET_LANGUAGE') {
            applyI18n();
        }
    });

    // 3. Initial check when iframe finishes loading
    window.onload = applyI18n;
</script>
</body>
</html>
