name: Android AI Auto Release

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "代码来源 (Branch/Tag/SHA)"
        required: true
        default: "main"
      release_tag:
        description: "本次发布的 Tag (如 v10)"
        required: true
      prerelease_flag:
        description: "标记为预发布 (Pre-release)"
        type: boolean
        default: false
      draft_flag:
        description: "是否存为草稿 (Draft)"
        type: boolean
        default: true
      notify_flag:
        description: '是否弹窗提示更新 (Notify User)?'
        required: true
        default: false
        type: boolean  # 渲染成复选框
      force_update_flag:
        description: '是否强制更新 (Force Update)?'
        required: true
        default: false
        type: boolean  # 渲染成复选框

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space (The Heavy Way)
        run: |
          echo "Before cleaning:"
          df -h
          # 删除 .NET
          sudo rm -rf /usr/share/dotnet
          # 删除 Haskell (GHC)
          sudo rm -rf /opt/ghc
          # 删除一些不常用的 Android 组件 (保留 API 33)
          sudo rm -rf /usr/local/lib/android/sdk/platforms/android-28
          sudo rm -rf /usr/local/lib/android/sdk/platforms/android-29
          sudo rm -rf /usr/local/lib/android/sdk/platforms/android-30
          sudo rm -rf /usr/local/lib/android/sdk/ndk/25.* # 删掉旧版 NDK
          echo "After cleaning:"
          df -h

      - name: Checkout Project
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref }}
          fetch-depth: 0
          submodules: recursive  # <--- 必须加上这一行

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@nightly # 改为 nightly
        with:
          toolchain: nightly-2026-02-13 # 匹配日志里的版本
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c # 建议根据你的项目需求选择版本
          add-to-path: true

      # 5. 执行构建命令
      - name: Build Components
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          chmod +x ./script/build-streamer.sh
          ./script/build-streamer.sh
          chmod +x ./script/build-rclone.sh
          ./script/build-rclone.sh
          chmod +x ./script/build-orbit.sh
          ./script/build-orbit.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Calculate Version and Strategy
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 将 CI 的 inputs 注入为环境变量供 Python 读取
          INPUT_NOTIFY: ${{ github.event.inputs.notify_flag }}       # 替换为你实际的 input key
          INPUT_FORCE: ${{ github.event.inputs.force_update_flag }}  # 替换为你实际的 input key
        run: |
          # 依然保留 git fetch 确保本地环境有 tag 缓存（虽然 gh cli 走的是 API，但留着稳妥）
          git fetch --tags
          # 直接运行 Python 脚本
          python3 ./script/calculate_meta.py

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease -PversionCode=${{ env.VC }} -PversionName=${{ github.event.inputs.release_tag }}

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app-mirror/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub

      - name: Generate AI Notes
        env:
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
        run: |
          # 执行你的 Python 脚本
          python ./script/ai_release_notes.py \
            --old ${{ env.LAST_TAG }} \
            --new ${{ github.event.inputs.source_ref }} \
            --repo . \
            --output ai_content.md

      - name: Create Release Task
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 读取 AI 生成的 Markdown 文本
          AI_SUMMARY=$(cat ai_content.md 2>/dev/null || echo "AI 摘要生成失败，请检查脚本输出。")
          
          # =================【 🛠️ 修复：对齐 Python 算出来的最新变量 】=================
          METADATA="<!--
          RELEASE_METADATA_START
          versionCode=${{ env.VC }}
          lastNotifyVersionCode=${{ env.LAST_NOTIFY_VC }}
          lastForceVersionCode=${{ env.LAST_FORCE_VC }}
          RELEASE_METADATA_END
          -->"
          # =========================================================================
          
          FINAL_BODY="### ✨ AI 自动更新摘要\n$AI_SUMMARY\n\n$METADATA"
          
          # 拼装参数：处理 draft 和 prerelease 标志
          PRERELEASE_OPT=""
          if [ "${{ github.event.inputs.prerelease_flag }}" = "true" ]; then
            PRERELEASE_OPT="--prerelease"
          fi
          
          DRAFT_OPT=""
          if [ "${{ github.event.inputs.draft_flag }}" = "true" ]; then
            DRAFT_OPT="--draft"
          fi
          
          # 1. 获取插件输出的物理路径
          RAW_SIGNED_APK="${{ steps.sign_app.outputs.signedReleaseFile }}"
          
          # 2. 定义一个漂亮的名字
          CLEAN_NAME="orbit_android.apk"
          
          # 3. 重命名文件到当前工作目录
          mv "$RAW_SIGNED_APK" "./$CLEAN_NAME"
          
          # 4. 运行修复后的 Python 脚本动态生成 assetlinks.json
          python3 ./script/generate_assetlinks.py "./$CLEAN_NAME" "./assetlinks.json"
          
          # 5. 同时发布 APK 和由 Python 生成的 assetlinks.json 两个资产文件
          gh release create ${{ github.event.inputs.release_tag }} \
            --target ${{ github.event.inputs.source_ref }} \
            --title "Release ${{ github.event.inputs.release_tag }}" \
            --notes "$FINAL_BODY" \
            $DRAFT_OPT \
            $PRERELEASE_OPT \
            "./$CLEAN_NAME" \
            "./assetlinks.json"