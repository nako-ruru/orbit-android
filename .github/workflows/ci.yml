name: Android AI Auto Release

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "代码来源 (Branch/Tag/SHA)"
        required: true
        default: "main"
      release_tag:
        description: "本次发布的 Tag (如 v10)"
        required: true
      prerelease_flag:
        description: "标记为预发布 (Pre-release)"
        type: boolean
        default: false
      draft_flag:
        description: "是否存为草稿 (Draft)"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref }}
          fetch-depth: 0
          submodules: recursive  # <--- 必须加上这一行

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c # 建议根据你的项目需求选择版本
          add-to-path: true

      # 5. 执行构建命令
      - name: Build Components
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          chmod +x ./script/build-streamer.sh
          ./script/build-streamer.sh
          chmod +x ./script/build-rclone.sh
          ./script/build-rclone.sh
          chmod +x ./script/orbit.sh
          ./script/orbit.sh

      - name: Calculate Version and Strategy
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 自动计算本次的 versionCode (基于已有的 v* Tag 最大值 + 1)
          git fetch --tags
          MAX_TAG_NUM=$(git tag -l "v*" | sed 's/v//' | sort -n | tail -n 1 || echo "0")
          CURRENT_VC=$((MAX_TAG_NUM + 1))
          
          # 2. 确定上一个 Tag 作为 AI Diff 的起点
          LAST_TAG="v$MAX_TAG_NUM"
          
          # 3. 从上个 Release Body 继承强制更新断点
          LAST_BODY=$(gh release view "$LAST_TAG" --json body -q '.body' || echo "")
          OLD_FORCE=$(echo -e "$LAST_BODY" | grep "lastForceVersionCode=" | cut -d'=' -f2 || echo "0")

          echo "VC=$CURRENT_VC" >> $GITHUB_ENV
          echo "LAST_TAG=$LAST_TAG" >> $GITHUB_ENV
          echo "OLD_FORCE=$OLD_FORCE" >> $GITHUB_ENV

      - name: Build Release APK
        run: |
          # 1. 下载到上级目录，方便平级引用
          curl -o /tmp/moonlight.zip https://github-runner.guanghe.asia:2096/moonlight-android.zip -H "Authorization: Bearer YVNadQnQkXiWZ4t3u0sapYYDQVBZD4k2"
          
          # -j 参数可以去掉压缩包内的顶层目录名，或者根据你的压缩包结构调整
          unzip -o /tmp/moonlight.zip -d ../
          
          # 3. 检查一下目录结构（调试用，如果报错可以看日志）
          ls -R ../moonlight-android | head -n 20
          
          chmod +x gradlew
          ./gradlew assembleRelease -Pvc=${{ env.VC }}

      - name: Install Build Tools
        run: echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;29.0.3"

      # 1. 签名步骤
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app-mirror/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub

      - name: Generate AI Notes
        env:
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
        run: |
          # 执行你的 Python 脚本
          python .github/workflows/ai_release_notes.py \
            --old ${{ env.LAST_TAG }} \
            --new ${{ github.event.inputs.source_ref }} \
            --repo . \
            --output ai_content.md

      - name: Create Release Task
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 读取 AI 生成的 Markdown 文本
          # 如果文件不存在则提供回退信息
          AI_SUMMARY=$(cat ai_content.md 2>/dev/null || echo "AI 摘要生成失败，请检查脚本输出。")

          # 构造元数据 (隐藏在注释中)
          METADATA="<!--
          RELEASE_METADATA_START
          versionCode=${{ env.VC }}
          lastNotifyVersionCode=${{ env.VC }}
          lastForceVersionCode=${{ env.OLD_FORCE }}
          RELEASE_METADATA_END
          -->"

          FINAL_BODY="### ✨ AI 自动更新摘要\n$AI_SUMMARY\n\n$METADATA"

          # 拼装参数：处理 draft 和 prerelease 标志
          PRERELEASE_OPT=""
          if [ "${{ github.event.inputs.prerelease_flag }}" = "true" ]; then
            PRERELEASE_OPT="--prerelease"
          fi

          DRAFT_OPT=""
          if [ "${{ github.event.inputs.draft_flag }}" = "true" ]; then
            DRAFT_OPT="--draft"
          fi
          
          # 1. 获取插件输出的那个尴尬的路径
          RAW_SIGNED_APK="${{ steps.sign_app.outputs.signedReleaseFile }}"
          
          # 2. 定义一个漂亮的名字
          CLEAN_NAME="orbit_android.apk"
          
          # 3. 重命名文件
          mv "$RAW_SIGNED_APK" "./$CLEAN_NAME"
          
          # 4. 发布这个漂亮名字的文件
          gh release create ${{ github.event.inputs.release_tag }} \
            --target ${{ github.event.inputs.source_ref }} \
            --title "Release ${{ github.event.inputs.release_tag }}" \
            --notes "$FINAL_BODY" \
            $DRAFT_OPT \
            $PRERELEASE_OPT \
            "./$CLEAN_NAME"